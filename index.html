<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artome — Production Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <!-- Artome logo: stylized A + RTOME wordmark, white version -->
      <svg viewBox="0 0 260 60" height="48" xmlns="http://www.w3.org/2000/svg" aria-label="Artome">
        <!-- Stylised A: two angled strokes with a horizontal cut, no crossbar at top -->
        <polygon points="0,52 18,8 28,8 46,52 36,52 28,30 24,19 20,30 12,52" fill="#ffffff"/>
        <!-- Orange diagonal cut / notch on the A -->
        <polygon points="12,40 22,40 18,52 8,52" fill="#F5620F"/>
        <!-- RTOME wordmark -->
        <text x="56" y="50" font-family="Barlow,Arial,sans-serif" font-weight="800"
              font-size="44" letter-spacing="1" fill="#ffffff">RTOME</text>
      </svg>
    </div>
    <div class="login-divider"></div>
    <p class="login-subtitle">Production Tracker</p>
    <div class="login-field">
      <input type="password" id="login-input" placeholder="Enter password"
        autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      <button class="login-btn" onclick="doLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="login-error" id="login-error">Incorrect password</div>
  </div>
</div>

<!-- CONFIG BANNER -->
<div id="config-banner">
  <span>Open <strong>config.js</strong> and add your Supabase URL &amp; anon key to get started.</span>
  <a href="https://supabase.com" target="_blank">Create free Supabase project →</a>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <!-- Artome logo white, smaller for header -->
    <svg viewBox="0 0 260 60" height="32" xmlns="http://www.w3.org/2000/svg" aria-label="Artome">
      <polygon points="0,52 18,8 28,8 46,52 36,52 28,30 24,19 20,30 12,52" fill="#ffffff"/>
      <polygon points="12,40 22,40 18,52 8,52" fill="#F5620F"/>
      <text x="56" y="50" font-family="Barlow,Arial,sans-serif" font-weight="800"
            font-size="44" letter-spacing="1" fill="#ffffff">RTOME</text>
    </svg>
    <div class="logo-separator"></div>
    <div class="logo-sub">Production<br>Tracker</div>
  </div>
  <div class="header-center" id="connection-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-label">Connecting…</span>
  </div>
  <div class="header-meta">
    <div id="live-time">--:--:--</div>
    <div id="live-date"></div>
  </div>
</header>

<!-- ── APP: 3-column grid: form | divider | log ── -->
<div class="app">

  <!-- FORM PANEL -->
  <div class="form-panel">
    <div class="form-inner">
      <div class="panel-title">New Entry</div>

      <!-- WORKER -->
      <div class="field">
        <label>Worker</label>
        <div class="pill-group" id="worker-pills">
          <div class="loading-pills">Loading…</div>
        </div>
      </div>

      <!-- PRODUCT -->
      <div class="field">
        <label>Product</label>
        <div class="pill-group" id="product-pills">
          <div class="loading-pills">Loading…</div>
        </div>
      </div>

      <!-- WORK PHASE — dropdown -->
      <div class="field">
        <label>Work Phase <span id="phase-product-tag"></span></label>
        <div class="select-wrap">
          <select id="phase-select" onchange="selectPhaseFromDropdown(this.value)">
            <option value="">— select a product first —</option>
          </select>
          <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <!-- QUANTITY -->
      <div class="field">
        <label>Quantity</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="adjustQty(-1)">−</button>
          <input type="number" id="qty-input" value="1" min="0.1" step="0.1">
          <button class="qty-btn" onclick="adjustQty(1)">+</button>
        </div>
      </div>

      <!-- SUBMIT -->
      <button class="submit-btn" id="submit-btn" onclick="submitEntry()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Log Entry
      </button>

      <!-- TODAY'S SUMMARY -->
      <div class="summary-section">
        <div class="panel-title" style="margin-top:36px">Today's Summary</div>
        <div class="summary-cards" id="summary-cards">
          <div class="summary-empty">No entries today yet</div>
        </div>
      </div>
    </div>
  </div>

  <!-- LOG PANEL -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-header-left">
        <span class="log-count" id="log-count">— entries</span>
        <div class="filter-row">
          <select id="filter-worker" onchange="applyFilters()"><option value="">All workers</option></select>
          <select id="filter-product" onchange="applyFilters()"><option value="">All products</option></select>
        </div>
      </div>
      <div class="log-actions">
        <button class="action-btn" onclick="exportXLSX()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export XLSX
        </button>
        <button class="action-btn" onclick="loadEntries()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>
    </div>
    <div class="log-table-wrap" id="log-table-wrap">
      <div class="loading-state"><div class="spinner"></div>Connecting to database…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
